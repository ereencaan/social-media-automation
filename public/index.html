<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitra — Social & CRM Automation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===================== AUTH SCREEN ===================== -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="logo-mark">H</div>
        <div>
          <div class="auth-title">Hitra</div>
          <div class="auth-subtitle">Social & CRM Automation</div>
        </div>
      </div>

      <div class="auth-tabs">
        <button class="tab active" data-tab="login">Log in</button>
        <button class="tab" data-tab="register">Sign up</button>
      </div>

      <!-- Login form -->
      <form id="login-form" class="auth-form">
        <label>Email
          <input type="email" name="email" required placeholder="you@company.com" />
        </label>
        <label>Password
          <input type="password" name="password" required minlength="8" placeholder="••••••••" />
        </label>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
        <div class="auth-error" id="login-error"></div>
      </form>

      <!-- Register form -->
      <form id="register-form" class="auth-form hidden">
        <label>Workspace name
          <input type="text" name="orgName" required placeholder="Acme Inc." />
        </label>
        <label>Your name
          <input type="text" name="name" placeholder="Jane Doe" />
        </label>
        <label>Email
          <input type="email" name="email" required placeholder="you@company.com" />
        </label>
        <label>Password
          <input type="password" name="password" required minlength="8" placeholder="At least 8 characters" />
        </label>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
        <div class="auth-error" id="register-error"></div>
      </form>

      <div class="auth-footer">
        Secure multi-tenant workspace · Your data is isolated by organization.
      </div>
    </div>
  </div>

  <!-- ===================== APP SHELL ===================== -->
  <div id="app-shell" class="app-shell hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-mark">H</div>
        <div>
          <div class="brand-name">Hitra</div>
          <div class="brand-org" id="sidebar-org">—</div>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-item" data-route="dashboard"><span class="nav-icon">⬡</span> Dashboard</a>
        <a class="nav-item" data-route="leads"><span class="nav-icon">◎</span> Leads</a>
        <a class="nav-item" data-route="posts"><span class="nav-icon">✦</span> Posts</a>
        <a class="nav-item" data-route="brand"><span class="nav-icon">❖</span> Brand</a>
        <a class="nav-item" data-route="settings"><span class="nav-icon">⚙</span> Settings</a>
      </nav>
      <div class="sidebar-user">
        <div class="avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">—</div>
          <div class="user-email" id="user-email">—</div>
        </div>
        <button class="icon-btn" id="btn-logout" title="Log out">⎋</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="topbar">
        <div class="page-title" id="page-title">Dashboard</div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>

      <div class="page" id="page"></div>
    </main>
  </div>

  <!-- Lead drawer -->
  <div class="drawer-backdrop hidden" id="drawer-backdrop"></div>
  <aside class="drawer hidden" id="drawer"></aside>

  <!-- Toasts -->
  <div class="toast-stack" id="toast-stack"></div>

  <script src="app.js"></script>
</body>
</html>
