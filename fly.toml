# fly.toml app configuration file generated for social-media-automation on 2026-04-20T11:54:26+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'social-media-automation'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
[env]
  APP_BASE_URL = "https://hitrapost.co.uk"

[[mounts]]
  source = "hitrapost_data"
  destination = "/app/storage"
